<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculateur DIY E-Liquide</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect } = React;

        // Icônes SVG
        const Droplet = ({ className }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 2.69l5.66 5.66a8 8 0 11-11.31 0z" />
            </svg>
        );

        const Calculator = ({ className }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <rect x="4" y="2" width="16" height="20" rx="2" strokeWidth={2} />
                <line x1="8" y1="6" x2="16" y2="6" strokeWidth={2} />
                <line x1="8" y1="10" x2="16" y2="10" strokeWidth={2} />
                <line x1="8" y1="14" x2="8.01" y2="14" strokeWidth={2} strokeLinecap="round" />
                <line x1="12" y1="14" x2="12.01" y2="14" strokeWidth={2} strokeLinecap="round" />
                <line x1="16" y1="14" x2="16.01" y2="14" strokeWidth={2} strokeLinecap="round" />
                <line x1="8" y1="18" x2="8.01" y2="18" strokeWidth={2} strokeLinecap="round" />
                <line x1="12" y1="18" x2="12.01" y2="18" strokeWidth={2} strokeLinecap="round" />
                <line x1="16" y1="18" x2="16.01" y2="18" strokeWidth={2} strokeLinecap="round" />
            </svg>
        );

        const Plus = ({ className }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <line x1="12" y1="5" x2="12" y2="19" strokeWidth={2} strokeLinecap="round" />
                <line x1="5" y1="12" x2="19" y2="12" strokeWidth={2} strokeLinecap="round" />
            </svg>
        );

        const Minus = ({ className }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <line x1="5" y1="12" x2="19" y2="12" strokeWidth={2} strokeLinecap="round" />
            </svg>
        );

        const Save = ({ className }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z" />
                <polyline points="17 21 17 13 7 13 7 21" strokeWidth={2} />
                <polyline points="7 3 7 8 15 8" strokeWidth={2} />
            </svg>
        );

        const BookOpen = ({ className }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z" />
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z" />
            </svg>
        );

        const Home = ({ className }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
            </svg>
        );

        const Trash2 = ({ className }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <polyline points="3 6 5 6 21 6" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round" />
                <path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round" />
                <line x1="10" y1="11" x2="10" y2="17" strokeWidth={2} strokeLinecap="round" />
                <line x1="14" y1="11" x2="14" y2="17" strokeWidth={2} strokeLinecap="round" />
            </svg>
        );

        // Système de stockage
        const storage = {
            get: async (key) => {
                const value = localStorage.getItem(key);
                return value ? { value } : null;
            },
            set: async (key, value) => {
                localStorage.setItem(key, value);
                return { key, value };
            }
        };

        if (typeof window !== 'undefined') {
            window.storage = storage;
        }

        function ELiquidCalculator() {
          const [activeTab, setActiveTab] = useState('calculator');
          const [volume, setVolume] = useState('');
          const [targetNicotine, setTargetNicotine] = useState('');
          const [baseNicotine, setBaseNicotine] = useState('');
          const [baseNicotinePG, setBaseNicotinePG] = useState(50);
          const [pgVgRatio, setPgVgRatio] = useState(50);
          const [aromes, setAromes] = useState([{ nom: '', pourcentage: '' }]);
          const [savedRecipes, setSavedRecipes] = useState([]);
          
          const [bases, setBases] = useState([
            { nom: '50/50', pgPercent: 50, disponible: true },
            { nom: '70/30', pgPercent: 70, disponible: true },
            { nom: '80/20', pgPercent: 80, disponible: true }
          ]);
          
          const [results, setResults] = useState({
            liquideNicotine: 0,
            basesUsed: [],
            aromes: 0,
            pgTotal: 0,
            vgTotal: 0,
            possible: true,
            message: ''
          });

          useEffect(() => {
            const loadData = async () => {
              try {
                const savedParams = await window.storage.get('last-params');
                if (savedParams) {
                  const params = JSON.parse(savedParams.value);
                  setVolume(params.volume || '');
                  setTargetNicotine(params.targetNicotine || '');
                  setBaseNicotine(params.baseNicotine || '');
                  setBaseNicotinePG(params.baseNicotinePG || 50);
                  setPgVgRatio(params.pgVgRatio || 50);
                  if (params.aromes && params.aromes.length > 0) {
                    setAromes(params.aromes);
                  }
                  if (params.bases) {
                    setBases(params.bases);
                  }
                }

                const recipes = await window.storage.get('saved-recipes');
                if (recipes) {
                  setSavedRecipes(JSON.parse(recipes.value));
                }
              } catch (error) {
                console.log('Première utilisation');
              }
            };
            loadData();
          }, []);

          useEffect(() => {
            const saveParams = async () => {
              const params = {
                volume,
                targetNicotine,
                baseNicotine,
                baseNicotinePG,
                pgVgRatio,
                aromes,
                bases
              };
              try {
                await window.storage.set('last-params', JSON.stringify(params));
              } catch (error) {
                console.error('Erreur sauvegarde:', error);
              }
            };
            
            if (volume || targetNicotine || baseNicotine) {
              saveParams();
            }
          }, [volume, targetNicotine, baseNicotine, baseNicotinePG, pgVgRatio, aromes, bases]);

          useEffect(() => {
            calculateRecipe();
          }, [volume, targetNicotine, baseNicotine, baseNicotinePG, pgVgRatio, aromes, bases]);

          const calculateRecipe = () => {
            const vol = parseFloat(volume) || 0;
            const targetNic = parseFloat(targetNicotine) || 0;
            const baseNic = parseFloat(baseNicotine) || 1;
            
            if (vol === 0) {
              setResults({
                liquideNicotine: 0,
                basesUsed: [],
                aromes: 0,
                pgTotal: 0,
                vgTotal: 0,
                possible: true,
                message: ''
              });
              return;
            }

            const liquideNicotineVol = (targetNic * vol) / baseNic;
            const aromesPercent = aromes.reduce((sum, arome) => sum + (parseFloat(arome.pourcentage) || 0), 0);
            const aromesTotalVol = (aromesPercent / 100) * vol;
            const pgFromAromes = aromesTotalVol;
            const vgFromAromes = 0;
            const pgFromNicotine = liquideNicotineVol * (baseNicotinePG / 100);
            const vgFromNicotine = liquideNicotineVol * ((100 - baseNicotinePG) / 100);
            const remainingVolume = vol - liquideNicotineVol - aromesTotalVol;
            const targetPG = (pgVgRatio / 100) * vol;
            const targetVG = ((100 - pgVgRatio) / 100) * vol;
            const neededPG = targetPG - pgFromAromes - pgFromNicotine;
            const neededVG = targetVG - vgFromAromes - vgFromNicotine;
            
            if (remainingVolume < 0) {
              setResults({
                liquideNicotine: liquideNicotineVol,
                basesUsed: [],
                aromes: aromesTotalVol,
                pgTotal: pgFromAromes + pgFromNicotine,
                vgTotal: vgFromAromes + vgFromNicotine,
                possible: false,
                message: 'Volume insuffisant'
              });
              return;
            }
            
            if (neededPG < 0 || neededVG < 0) {
              setResults({
                liquideNicotine: liquideNicotineVol,
                basesUsed: [],
                aromes: aromesTotalVol,
                pgTotal: pgFromAromes + pgFromNicotine,
                vgTotal: vgFromAromes + vgFromNicotine,
                possible: false,
                message: 'Ratio impossible à atteindre'
              });
              return;
            }
            
            const neededPGRatio = (neededPG / (neededPG + neededVG)) * 100;
            const availableBases = bases.filter(b => b.disponible);
            
            if (availableBases.length === 0) {
              setResults({
                liquideNicotine: liquideNicotineVol,
                basesUsed: [],
                aromes: aromesTotalVol,
                pgTotal: pgFromAromes + pgFromNicotine,
                vgTotal: vgFromAromes + vgFromNicotine,
                possible: false,
                message: 'Aucune base disponible'
              });
              return;
            }
            
            let bestSolution = null;
            let minError = Infinity;
            
            for (let i = 0; i < availableBases.length; i++) {
              const base = availableBases[i];
              const error = Math.abs(base.pgPercent - neededPGRatio);
              
              if (error < minError) {
                minError = error;
                const pgFromBase = remainingVolume * (base.pgPercent / 100);
                const vgFromBase = remainingVolume * ((100 - base.pgPercent) / 100);
                
                bestSolution = {
                  basesUsed: [{ ...base, volume: remainingVolume }],
                  pgTotal: pgFromAromes + pgFromNicotine + pgFromBase,
                  vgTotal: vgFromAromes + vgFromNicotine + vgFromBase,
                  message: error > 5 ? 'Approximation' : ''
                };
              }
            }
            
            for (let i = 0; i < availableBases.length; i++) {
              for (let j = i + 1; j < availableBases.length; j++) {
                const base1 = availableBases[i];
                const base2 = availableBases[j];
                const pg1 = base1.pgPercent / 100;
                const pg2 = base2.pgPercent / 100;
                
                if (Math.abs(pg1 - pg2) < 0.01) continue;
                
                const vol2 = (remainingVolume * pg1 - neededPG) / (pg1 - pg2);
                const vol1 = remainingVolume - vol2;
                
                if (vol1 >= 0 && vol2 >= 0) {
                  const pgFromBases = vol1 * pg1 + vol2 * pg2;
                  const vgFromBases = vol1 * (1 - pg1) + vol2 * (1 - pg2);
                  const error = Math.abs(pgFromBases - neededPG);
                  
                  if (error < 0.1) {
                    bestSolution = {
                      basesUsed: [
                        { ...base1, volume: vol1 },
                        { ...base2, volume: vol2 }
                      ].filter(b => b.volume > 0.01),
                      pgTotal: pgFromAromes + pgFromNicotine + pgFromBases,
                      vgTotal: vgFromAromes + vgFromNicotine + vgFromBases,
                      message: ''
                    };
                    break;
                  }
                }
              }
            }
            
            if (bestSolution) {
              setResults({
                liquideNicotine: liquideNicotineVol,
                ...bestSolution,
                aromes: aromesTotalVol,
                possible: true
              });
            }
          };

          const saveRecipe = async () => {
            const recipe = {
              id: Date.now(),
              date: new Date().toLocaleDateString('fr-FR'),
              time: new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' }),
              volume: parseFloat(volume) || 0,
              targetNicotine: parseFloat(targetNicotine) || 0,
              aromes: aromes.filter(a => a.nom || a.pourcentage),
              results
            };
            
            const newRecipes = [recipe, ...savedRecipes];
            setSavedRecipes(newRecipes);
            
            try {
              await window.storage.set('saved-recipes', JSON.stringify(newRecipes));
              alert('Recette sauvegardée !');
            } catch (error) {
              alert('Erreur de sauvegarde');
            }
          };

          const deleteRecipe = async (id) => {
            const newRecipes = savedRecipes.filter(r => r.id !== id);
            setSavedRecipes(newRecipes);
            try {
              await window.storage.set('saved-recipes', JSON.stringify(newRecipes));
            } catch (error) {
              console.error('Erreur suppression:', error);
            }
          };

          const loadRecipe = (recipe) => {
            setVolume(recipe.volume.toString());
            setTargetNicotine(recipe.targetNicotine.toString());
            setAromes(recipe.aromes);
            setActiveTab('calculator');
          };

          return (
            <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-4">
              <div className="max-w-5xl mx-auto">
                <div className="bg-white rounded-2xl shadow-xl p-6">
                  <div className="flex items-center gap-3 mb-6">
                    <Droplet className="w-8 h-8 text-indigo-600" />
                    <h1 className="text-2xl font-bold text-gray-800">Calculateur E-Liquide</h1>
                  </div>

                  <div className="flex gap-2 mb-6 border-b border-gray-200">
                    <button
                      onClick={() => setActiveTab('calculator')}
                      className={`flex items-center gap-2 px-4 py-2 font-medium ${
                        activeTab === 'calculator' ? 'text-indigo-600 border-b-2 border-indigo-600' : 'text-gray-600'
                      }`}
                    >
                      <Home className="w-4 h-4" />
                      Calculateur
                    </button>
                    <button
                      onClick={() => setActiveTab('recipes')}
                      className={`flex items-center gap-2 px-4 py-2 font-medium ${
                        activeTab === 'recipes' ? 'text-indigo-600 border-b-2 border-indigo-600' : 'text-gray-600'
                      }`}
                    >
                      <BookOpen className="w-4 h-4" />
                      Recettes ({savedRecipes.length})
                    </button>
                  </div>

                  {activeTab === 'calculator' ? (
                    <>
                      <div className="grid md:grid-cols-2 gap-4 mb-6">
                        <div>
                          <label className="block text-sm font-medium text-gray-700 mb-2">Volume total (ml)</label>
                          <input
                            type="number"
                            value={volume}
                            onChange={(e) => setVolume(e.target.value)}
                            className="w-full px-4 py-2 border rounded-lg"
                            placeholder="100"
                          />
                        </div>
                        <div>
                          <label className="block text-sm font-medium text-gray-700 mb-2">Nicotine souhaitée (mg/ml)</label>
                          <input
                            type="number"
                            value={targetNicotine}
                            onChange={(e) => setTargetNicotine(e.target.value)}
                            className="w-full px-4 py-2 border rounded-lg"
                            placeholder="3"
                          />
                        </div>
                        <div>
                          <label className="block text-sm font-medium text-gray-700 mb-2">Concentration liquide nicotiné (mg/ml)</label>
                          <input
                            type="number"
                            value={baseNicotine}
                            onChange={(e) => setBaseNicotine(e.target.value)}
                            className="w-full px-4 py-2 border rounded-lg"
                            placeholder="20"
                          />
                        </div>
                        <div>
                          <label className="block text-sm font-medium text-gray-700 mb-2">PG/VG liquide nicotiné</label>
                          <div className="flex items-center gap-3">
                            <input
                              type="range"
                              value={base.pgPercent}
                              onChange={(e) => {
                                const newBases = [...bases];
                                newBases[i].pgPercent = parseFloat(e.target.value);
                                setBases(newBases);
                              }}
                              className="flex-1"
                              min="0"
                              max="100"
                              step="5"
                            />
                            <span className="text-xs w-12">{base.pgPercent}/{100-base.pgPercent}</span>
                            {bases.length > 1 && (
                              <button
                                onClick={() => setBases(bases.filter((_, idx) => idx !== i))}
                                className="p-1 text-red-600"
                              >
                                <Minus className="w-4 h-4" />
                              </button>
                            )}
                          </div>
                        ))}
                      </div>

                      <div className="mb-6">
                        <div className="flex items-center justify-between mb-3">
                          <h2 className="text-lg font-semibold">Arômes (100% PG)</h2>
                          <button
                            onClick={() => setAromes([...aromes, { nom: '', pourcentage: '' }])}
                            className="flex items-center gap-2 px-3 py-1 bg-indigo-600 text-white rounded-lg text-sm"
                          >
                            <Plus className="w-4 h-4" />
                            Ajouter
                          </button>
                        </div>
                        {aromes.map((arome, i) => (
                          <div key={i} className="flex gap-2 mb-2 items-center">
                            <input
                              type="text"
                              value={arome.nom}
                              onChange={(e) => {
                                const newAromes = [...aromes];
                                newAromes[i].nom = e.target.value;
                                setAromes(newAromes);
                              }}
                              className="flex-1 min-w-0 px-3 py-2 border rounded-lg"
                              placeholder="Nom"
                            />
                            <input
                              type="number"
                              value={arome.pourcentage}
                              onChange={(e) => {
                                const newAromes = [...aromes];
                                newAromes[i].pourcentage = e.target.value;
                                setAromes(newAromes);
                              }}
                              className="w-16 px-2 py-2 border rounded-lg"
                              placeholder="10"
                            />
                            <span className="text-sm whitespace-nowrap">%</span>
                            {aromes.length > 1 && (
                              <button
                                onClick={() => setAromes(aromes.filter((_, idx) => idx !== i))}
                                className="p-2 text-red-600 flex-shrink-0"
                              >
                                <Minus className="w-4 h-4" />
                              </button>
                            )}
                          </div>
                        ))}
                      </div>

                      <div className="bg-indigo-50 rounded-xl p-4">
                        <div className="flex justify-between items-center mb-3">
                          <h2 className="text-lg font-semibold flex items-center gap-2">
                            <Calculator className="w-5 h-5" />
                            Recette
                          </h2>
                          {results.possible && parseFloat(volume) > 0 && (
                            <button
                              onClick={saveRecipe}
                              className="flex items-center gap-2 px-3 py-1 bg-green-600 text-white rounded-lg text-sm"
                            >
                              <Save className="w-4 h-4" />
                              Sauvegarder
                            </button>
                          )}
                        </div>

                        {!results.possible ? (
                          <div className="bg-red-100 p-3 rounded text-red-700">{results.message}</div>
                        ) : (
                          <div className="grid grid-cols-2 gap-3">
                            <div className="bg-white p-3 rounded">
                              <p className="text-xs text-gray-600">Liquide nicotiné</p>
                              <p className="text-xl font-bold text-indigo-600">{results.liquideNicotine.toFixed(2)} ml</p>
                            </div>
                            <div className="bg-white p-3 rounded">
                              <p className="text-xs text-gray-600">Arômes</p>
                              <p className="text-xl font-bold text-purple-600">{results.aromes.toFixed(2)} ml</p>
                            </div>
                            {results.basesUsed.map((base, i) => (
                              <div key={i} className="bg-white p-3 rounded">
                                <p className="text-xs text-gray-600">Base {base.nom}</p>
                                <p className="text-xl font-bold text-green-600">{base.volume.toFixed(2)} ml</p>
                              </div>
                            ))}
                          </div>
                        )}
                      </div>
                    </>
                  ) : (
                    <div className="space-y-3">
                      {savedRecipes.length === 0 ? (
                        <p className="text-gray-500 text-center py-8">Aucune recette sauvegardée</p>
                      ) : (
                        savedRecipes.map((recipe) => (
                          <div key={recipe.id} className="bg-gray-50 p-4 rounded-lg">
                            <div className="flex justify-between items-start mb-2">
                              <div>
                                <p className="font-semibold">{recipe.volume}ml - {recipe.targetNicotine}mg/ml</p>
                                <p className="text-sm text-gray-600">{recipe.date} à {recipe.time}</p>
                              </div>
                              <div className="flex gap-2">
                                <button
                                  onClick={() => loadRecipe(recipe)}
                                  className="px-3 py-1 bg-indigo-600 text-white rounded text-sm"
                                >
                                  Charger
                                </button>
                                <button
                                  onClick={() => deleteRecipe(recipe.id)}
                                  className="p-1 text-red-600"
                                >
                                  <Trash2 className="w-4 h-4" />
                                </button>
                              </div>
                            </div>
                            {recipe.aromes.length > 0 && (
                              <div className="text-sm text-gray-600">
                                Arômes: {recipe.aromes.map(a => `${a.nom || 'Sans nom'} ${a.pourcentage}%`).join(', ')}
                              </div>
                            )}
                          </div>
                        ))
                      )}
                    </div>
                  )}
                </div>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ELiquidCalculator />);
    </script>
</body>
</html>
