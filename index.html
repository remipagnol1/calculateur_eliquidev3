<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculateur e-liquide</title>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const volumeInput = document.getElementById('volume');
            const pgInput = document.getElementById('pg');
            const vgInput = document.getElementById('vg');
            const resultDisplay = document.getElementById('result');
            const calculationButton = document.getElementById('calculate');

            const saveToLocalStorage = () => {
                localStorage.setItem('volume', volumeInput.value);
                localStorage.setItem('pg', pgInput.value);
                localStorage.setItem('vg', vgInput.value);
            };

            const validateInputs = () => {
                const volume = parseFloat(volumeInput.value);
                const pg = parseFloat(pgInput.value);
                const vg = parseFloat(vgInput.value);
                if (isNaN(volume) || isNaN(pg) || isNaN(vg)) {
                    alert('Please enter valid numeric values.');
                    return false;
                }
                return true;
            };

            const calculate = () => {
                if (!validateInputs()) return;
                const volume = parseFloat(volumeInput.value);
                const pg = parseFloat(pgInput.value);
                const vg = parseFloat(vgInput.value);

                const total = pg + vg;
                const result = (volume * pg) / total;
                resultDisplay.textContent = `Your final mix is: ${result} ml of PG.`;
                saveToLocalStorage();
            };

            calculationButton.addEventListener('click', calculate);
            volumeInput.value = localStorage.getItem('volume') || '';
            pgInput.value = localStorage.getItem('pg') || '';
            vgInput.value = localStorage.getItem('vg') || '';
        });
    </script>
</head>
<body>
    <h1>Calculateur E-liquide</h1>
    <label for="volume">Volume (ml):</label>
    <input type="number" id="volume" required>
    <label for="pg">PG (%):</label>
    <input type="number" id="pg" required min="0" max="100">
    <label for="vg">VG (%):</label>
    <input type="number" id="vg" required min="0" max="100">
    <button id="calculate">Calculate</button>
    <div id="result"></div>
</body>
</html>
