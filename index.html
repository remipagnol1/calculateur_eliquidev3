<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.16.7/babel.min.js"></script>
</head>
<body class="bg-gray-100 p-4">
    <div id="calculator" class="max-w-md mx-auto bg-white rounded-lg shadow-md p-6">
        <h1 class="text-xl font-bold mb-4">E-Liquid Calculator</h1>
        <form id="calcForm">
            <div class="mb-4">
                <label for="base" class="block text-sm font-medium text-gray-700">Select Base:</label>
                <select id="base" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2">
                    <option value="50/50">50/50</option>
                    <option value="70/30">70/30</option>
                    <option value="100">100%</option>
                </select>
            </div>
            <div class="mb-4">
                <label for="nicotine" class="block text-sm font-medium text-gray-700">Nicotine Level (mg/ml):</label>
                <input type="number" id="nicotine" min="0" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2" required />
            </div>
            <div class="mb-4">
                <label for="pgvg" class="block text-sm font-medium text-gray-700">PG/VG Ratio:</label>
                <input type="text" id="pgvg" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2" placeholder="e.g. 70/30" required />
            </div>
            <div class="mb-4">
                <label for="aromatics" class="block text-sm font-medium text-gray-700">Aromatics:</label>
                <input type="text" id="aromatics" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2" placeholder="Aromatic names" />
            </div>
            <button type="submit" class="w-full bg-blue-500 text-white font-bold py-2 rounded">Calculate</button>
        </form>
        <div id="result" class="mt-4 text-lg"></div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const form = document.getElementById('calcForm');
            const resultDiv = document.getElementById('result');

            form.addEventListener('submit', function (e) {
                e.preventDefault();
                calculateLiquid();
            });

            function calculateLiquid() {
                const nicotine = parseFloat(document.getElementById('nicotine').value);
                const pgvg = document.getElementById('pgvg').value;
                const base = document.getElementById('base').value;
                // Perform calculations here based on user input
                let result = `Base: ${base}, Nicotine: ${nicotine}mg/ml, PG/VG Ratio: ${pgvg}`;
                resultDiv.textContent = result;
                saveToLocalStorage({ nicotine, pgvg, base });
            }

            function saveToLocalStorage(data) {
                localStorage.setItem('eliquidData', JSON.stringify(data));
            }
        });
    </script>
</body>
</html>
